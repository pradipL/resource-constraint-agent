services:

  # ── Qdrant vector database ────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      # qdrant image has no curl — use bash built-in TCP check instead
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── Resource Agent FastAPI ────────────────────────────────────────────────
  agent:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      QDRANT_HOST: qdrant
      PYTHONUNBUFFERED: "1"
    volumes:
      - traces_data:/app/traces
      - tmp_data:/app/tmp
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      qdrant:
        condition: service_healthy

volumes:
  qdrant_data:
  traces_data:
  tmp_data:
